services:
  postgres:
    image: postgres:17-alpine
    container_name: taskflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - taskflow-postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES}
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD}
      Seed__DemoDataEnabled: ${SEED_DEMO_DATA_ENABLED}
      Seed__DemoOrganizationsCount: ${SEED_DEMO_ORGANIZATIONS_COUNT}
      Seed__DemoUsersPerOrganization: ${SEED_DEMO_USERS_PER_ORGANIZATION}
      Seed__DemoProjectsPerOrganization: ${SEED_DEMO_PROJECTS_PER_ORGANIZATION}
      Seed__DemoTasksPerProject: ${SEED_DEMO_TASKS_PER_PROJECT}
      Seed__DemoUserPassword: ${SEED_DEMO_USER_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5005:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: taskflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  taskflow-postgres-data:

